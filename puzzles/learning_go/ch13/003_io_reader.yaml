description: |
  Write wordCount(r io.Reader) (map[string]int, error) that reads all text from an
  io.Reader and returns a frequency count of whitespace-separated words (case-insensitive,
  lowercased keys).

  Example: for input "Go go GO", the result is map[string]int{"go": 3}.

  The function must work with any io.Reader — strings, files, network streams, etc.
