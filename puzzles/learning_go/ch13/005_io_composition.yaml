id: "lg13-005"
title: "io.TeeReader Checksum"
concept: "io"
difficulty: 6
description: |
  Implement checksumAndCollect(r io.Reader) (content string, checksum string, err error)
  that reads all content from r and simultaneously computes a SHA-256 hex digest, using
  io.TeeReader to avoid reading the data twice.

  The function should:
  1. Use io.TeeReader to fork the reader into a hash writer
  2. Read the full content from the tee reader
  3. Return both the content string and the hex-encoded SHA-256 hash

  Example:
    content, hash, _ := checksumAndCollect(strings.NewReader("hello"))
    // content == "hello"
    // hash == "2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824"
