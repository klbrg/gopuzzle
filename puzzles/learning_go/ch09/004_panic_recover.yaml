id: "lg09-004"
title: "Panic and Recover"
concept: "errors"
difficulty: 6
description: |
  Go uses panic for truly unrecoverable situations and recover to catch
  panics at function boundaries. Normal error handling uses return values,
  but sometimes you need to catch panics from third-party code or convert
  them to errors.

  Write a function SafeDivide(a, b int) (result int, err error) that
  divides a by b. If b is zero, Go will panic with an integer divide by
  zero error. Use defer/recover to catch this panic and return it as an
  error instead. On success, return the result with nil error.

  Write a function SafeCall(f func()) (err error) that calls f and
  recovers from any panic it might cause, returning the panic value as
  an error. If f does not panic, return nil. Convert the panic value to
  an error using fmt.Errorf.

  Write a function MustParse(s string) int that parses a string as an
  integer using strconv.Atoi. If parsing fails, panic with the error.
  This is the "Must" pattern used in Go for initialization-time calls
  that should never fail.

  Examples:
    SafeDivide(10, 2)  => (5, nil)
    SafeDivide(10, 0)  => (0, error)

    SafeCall(func() { panic("boom") })  => error("boom")
    SafeCall(func() { /* ok */ })        => nil

    MustParse("42")    => 42
    MustParse("bad")   => panics
