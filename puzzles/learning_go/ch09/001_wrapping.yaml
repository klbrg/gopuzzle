id: "lg09-001"
title: "Error Wrapping"
concept: "errors"
difficulty: 5
description: |
  Write a function lookupUser(id int) (string, error) that returns a user name
  for known IDs and an error for unknown ones. Known users:
    1 => "Alice"
    2 => "Bob"
  For unknown IDs, return a sentinel error ErrNotFound.

  Write a function greetUser(id int) (string, error) that calls lookupUser
  and, if it fails, wraps the error with additional context using fmt.Errorf
  and the %w verb. The wrapped message should be:
    "greetUser(id=<id>): <original error>"
  On success, return "Hello, <name>!" with no error.

  The caller should be able to use errors.Is to detect ErrNotFound even
  through the wrapping.

  Examples:
    greetUser(1)  => ("Hello, Alice!", nil)
    greetUser(99) => ("", error wrapping ErrNotFound)
    errors.Is(err, ErrNotFound) => true
template: |
