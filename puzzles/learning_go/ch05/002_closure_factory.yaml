id: "lg05-002"
title: "Closures Returning Closures"
concept: "functions"
difficulty: 3
description: |
  Write a function makeAccumulator that takes an initial int value and
  returns a function. The returned function takes an int and returns an
  int: each call adds its argument to a running total (starting from
  the initial value) and returns the new total.

  Also write a function makePrefixer that takes a string prefix and
  returns a function that takes a string and returns the prefix joined
  with a space to the argument.

  For example:
    acc := makeAccumulator(10)
    acc(5)   returns 15
    acc(3)   returns 18
    acc(-8)  returns 10

    greet := makePrefixer("Hello")
    greet("Alice") returns "Hello Alice"
    greet("Bob")   returns "Hello Bob"
template: |
