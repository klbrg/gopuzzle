id: "lg15-003"
title: "Comparison Test Helper"
concept: "testing"
difficulty: 6
description: |
  Implement an Equal function that deeply compares two values and a StringSet type,
  then write tests using a helper function pattern.

  1. StringSet — an ordered set of unique strings:
     - NewStringSet(vals ...string) StringSet
     - (s StringSet) Contains(v string) bool
     - (s StringSet) Len() int
     - (s StringSet) Slice() []string — returns sorted unique values

  2. Equal(a, b StringSet) bool — returns true if both sets contain the same elements.

  Duplicates in the input should be removed. Order does not matter for equality.

  Example:
    a := NewStringSet("b", "a", "a")
    b := NewStringSet("a", "b")
    Equal(a, b)       // true
    a.Slice()         // ["a", "b"]
    a.Contains("a")   // true
    a.Len()           // 2
