id: "lg15-002"
title: "Test Double with Interface"
concept: "testing"
difficulty: 6
description: |
  Implement a UserService that depends on a UserStore interface for data access.
  The puzzle demonstrates how interfaces enable test doubles (stubs/fakes).

  1. Define a UserStore interface:
     - GetUser(id string) (string, error) — returns user name or error

  2. Implement UserService:
     - NewUserService(store UserStore) *UserService
     - (s *UserService) Greet(id string) (string, error) — returns "Hello, <name>!"
       or wraps the store error with "user not found: <original error>"

  The test code provides a fakeStore implementation. Your job is to write the
  production code that works with any UserStore.

  Example:
    store has "u1" -> "Alice"
    svc := NewUserService(store)
    svc.Greet("u1") => "Hello, Alice!", nil
    svc.Greet("u99") => "", error("user not found: ...")
