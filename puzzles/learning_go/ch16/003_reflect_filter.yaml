id: "lg16-003"
title: "Reflection-Based Map"
concept: "advanced"
difficulty: 8
description: |
  Implement MapSlice(slice any, fn any) (any, error) that applies a transformation
  function to each element of a slice, returning a new slice. Both the input slice
  and function types are determined at runtime using reflect.

  Validation rules:
  - slice must be a slice (otherwise return error "first arg must be a slice")
  - fn must be a function (otherwise return error "second arg must be a function")
  - fn must take exactly 1 argument matching the slice element type
  - fn must return exactly 1 value

  Example:
    MapSlice([]int{1, 2, 3}, func(i int) int { return i * 2 })
    // => []int{2, 4, 6}, nil

    MapSlice([]string{"a", "b"}, func(s string) int { return len(s) })
    // => []int{1, 1}, nil

    MapSlice([]int{1, 2}, func(s string) string { return s })
    // => nil, error (type mismatch)
