id: "lg16-002"
title: "Timed Function Wrapper"
concept: "advanced"
difficulty: 8
description: |
  Implement TimedCall(f any, args ...any) ([]any, time.Duration, error) that:
  1. Validates f is a function using reflect
  2. Validates the number of arguments matches the function signature
  3. Calls f with the provided arguments
  4. Returns the results as []any, the elapsed time, and nil error

  If f is not a function, return nil, 0, with an error "not a function".
  If the argument count is wrong, return nil, 0, with an error "expected N args, got M".

  Example:
    add := func(a, b int) int { return a + b }
    results, elapsed, err := TimedCall(add, 3, 4)
    // results = [7], elapsed = ~0s, err = nil

    results, elapsed, err := TimedCall(strings.Contains, "hello world", "world")
    // results = [true], elapsed = ~0s, err = nil
template: |
