id: "lg16-004"
title: "CSV Marshal with Reflect"
concept: "advanced"
difficulty: 8
description: |
  Implement MarshalCSV(slice any) (string, error) that takes a slice of structs and
  returns CSV text. Column names come from `csv` struct tags. Fields without a `csv`
  tag are skipped. The first row is the header.

  Supported field types: string, int, bool. Return an error for unsupported types.
  Return an error if the input is not a slice of structs.

  Example:
    type Person struct {
        Name string `csv:"name"`
        Age  int    `csv:"age"`
        Pet  bool   `csv:"has_pet"`
        Nick string // no tag, skip
    }
    people := []Person{
        {"Alice", 30, true, "Al"},
        {"Bob", 25, false, "Bobby"},
    }
    MarshalCSV(people) =>
      "name,age,has_pet\nAlice,30,true\nBob,25,false\n"
