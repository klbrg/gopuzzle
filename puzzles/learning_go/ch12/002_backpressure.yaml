id: "lg12-002"
title: "Backpressure"
concept: "concurrency"
difficulty: 7
description: |
  Implement a Throttle that limits the number of concurrent operations.

  NewThrottle(limit int) *Throttle — creates a throttle allowing at most limit concurrent calls.
  (t *Throttle) Do(f func()) bool — runs f if under the limit and returns true. If at capacity, returns false immediately without running f.
  (t *Throttle) ActiveCount() int — returns the number of currently running operations.

  Example:
    th := NewThrottle(2)
    th.Do(func() { time.Sleep(time.Second) }) // true, runs
    th.Do(func() { time.Sleep(time.Second) }) // true, runs
    th.Do(func() { time.Sleep(time.Second) }) // false, at capacity
