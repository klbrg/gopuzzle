test_code: |
  package main

  import (
  	"sort"
  	"testing"
  )

  func makeChan(vals ...int) <-chan int {
  	ch := make(chan int)
  	go func() {
  		for _, v := range vals {
  			ch <- v
  		}
  		close(ch)
  	}()
  	return ch
  }

  func collect(ch <-chan int) []int {
  	var result []int
  	for v := range ch {
  		result = append(result, v)
  	}
  	return result
  }

  func TestMergeTwoChannels(t *testing.T) {
  	out := merge(makeChan(1, 2, 3), makeChan(4, 5, 6))
  	got := collect(out)
  	sort.Ints(got)
  	want := []int{1, 2, 3, 4, 5, 6}
  	if len(got) != len(want) {
  		t.Fatalf("expected %d values, got %d", len(want), len(got))
  	}
  	for i := range want {
  		if got[i] != want[i] {
  			t.Errorf("index %d: expected %d, got %d", i, want[i], got[i])
  		}
  	}
  }

  func TestMergeSingleChannel(t *testing.T) {
  	out := merge(makeChan(42))
  	got := collect(out)
  	if len(got) != 1 || got[0] != 42 {
  		t.Errorf("expected [42], got %v", got)
  	}
  }

  func TestMergeNoChannels(t *testing.T) {
  	out := merge()
  	got := collect(out)
  	if len(got) != 0 {
  		t.Errorf("expected empty, got %v", got)
  	}
  }

  func TestMergeManyChannels(t *testing.T) {
  	chs := make([]<-chan int, 5)
  	for i := range chs {
  		chs[i] = makeChan(i*10, i*10+1)
  	}
  	out := merge(chs...)
  	got := collect(out)
  	if len(got) != 10 {
  		t.Errorf("expected 10 values, got %d", len(got))
  	}
  }

  func TestMergeOutputCloses(t *testing.T) {
  	out := merge(makeChan(1), makeChan(2))
  	collect(out) // should not hang
  	// If output channel is not closed, range will block forever
  	// and the test will timeout
  }
hint: "Create the output channel, then for each input launch a goroutine that ranges over it and sends to output. Use wg.Add(len(channels)) before the loop and wg.Done() in each goroutine. A final goroutine does wg.Wait() then close(out)."
solution: |
  package main

  import "sync"

  func merge(channels ...<-chan int) <-chan int {
  	out := make(chan int)
  	var wg sync.WaitGroup
  	wg.Add(len(channels))
  	for _, ch := range channels {
  		go func(c <-chan int) {
  			defer wg.Done()
  			for v := range c {
  				out <- v
  			}
  		}(ch)
  	}
  	go func() {
  		wg.Wait()
  		close(out)
  	}()
  	return out
  }
explanation: |
  The fan-in pattern merges multiple channels into one. The key challenge is
  knowing when to close the output channel: it must stay open until ALL inputs
  are drained.

  sync.WaitGroup solves this elegantly:
  1. Add the count of input channels
  2. Each goroutine reads from one input and calls Done() when that input closes
  3. A coordinator goroutine calls Wait() then close(out)

  The coordinator goroutine is essential — you cannot call wg.Wait() in the main
  goroutine because it would block before you could read from the output channel,
  causing a deadlock.

  Note the closure capture: passing ch as a parameter to the goroutine function
  avoids the classic loop variable capture bug (though Go 1.22+ fixes this for
  range variables).
reference: "https://learning.oreilly.com/library/view/learning-go-2nd/9781098139285/ch12.html"
