id: "lg12-004"
title: "Fan-In with WaitGroup"
concept: "concurrency"
difficulty: 7
description: |
  Implement merge(channels ...<-chan int) <-chan int that fans-in multiple input
  channels into a single output channel. The output channel must close only after
  ALL input channels have been fully drained.

  Use sync.WaitGroup to coordinate: one goroutine per input channel reads values
  and forwards them to the output. A separate goroutine waits on the WaitGroup
  and then closes the output.

  Example:
    ch1 sends: 1, 2     ch2 sends: 10, 20
    merge(ch1, ch2) produces: 1, 2, 10, 20 (order may vary)
    then the output channel closes
template: |
  package main

  import "sync"

  func merge(channels ...<-chan int) <-chan int {
  	// TODO: fan-in all channels into one output channel
  	// Use sync.WaitGroup to close output after all inputs drain
