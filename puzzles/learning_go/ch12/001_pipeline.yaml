id: "lg12-001"
title: "Channel Pipeline"
concept: "concurrency"
difficulty: 7
description: |
  Build a three-stage channel pipeline that processes integers:
  1. generator(nums ...int) <-chan int — sends each number into a channel, then closes it.
  2. square(in <-chan int) <-chan int — reads from in, squares each value, sends to output channel.
  3. sum(in <-chan int) int — reads all values from in and returns their sum.

  Example: generator(2, 3, 4) -> square -> sum => 4 + 9 + 16 = 29
