id: "lg12-003"
title: "Lazy Singleton with sync.Once"
concept: "concurrency"
difficulty: 6
description: |
  Implement a thread-safe lazy-initialized registry using sync.Once.

  NewRegistry() *Registry — creates a new registry (the internal map should NOT be
  initialized yet).
  (r *Registry) Get(key string) (string, bool) — returns the value for key, initializing
  the internal map on first access.
  (r *Registry) Set(key, value string) — sets a key-value pair, initializing the internal
  map on first access.

  The critical requirement: the internal map must be allocated exactly once, no matter how
  many goroutines call Get or Set concurrently. Do not initialize it in NewRegistry.

  Example:
    r := NewRegistry()
    r.Set("lang", "Go")
    v, ok := r.Get("lang") // "Go", true
    _, ok = r.Get("missing") // "", false
