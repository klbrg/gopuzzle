id: "lg12-005"
title: "Cancellable Generator"
concept: "concurrency"
difficulty: 7
description: |
  Implement countUp(ctx context.Context) <-chan int that emits sequential integers
  (0, 1, 2, ...) on a channel until the context is cancelled. When cancelled, the
  goroutine must exit cleanly and close the channel.

  Also implement takeN(ctx context.Context, in <-chan int, n int) []int that
  reads at most n values from the channel, respecting context cancellation.
  The caller is responsible for cancelling the context to stop the producer.

  Example:
    ctx, cancel := context.WithCancel(context.Background())
    ch := countUp(ctx)
    // read 3 values: [0, 1, 2]
    cancel() // goroutine exits, channel closes
