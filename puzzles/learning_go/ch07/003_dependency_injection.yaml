id: "lg07-003"
title: "Dependency Injection via Interfaces"
concept: "interfaces"
difficulty: 6
description: |
  Go uses implicit interfaces for dependency injection: a struct depends
  on an interface, and the concrete implementation is provided at
  construction time.

  Define a Notifier interface with one method:
    Send(to string, message string) string

  Implement an EmailNotifier struct (no fields needed) whose Send method
  returns: "email to <to>: <message>"

  Implement an SMSNotifier struct (no fields needed) whose Send method
  returns: "sms to <to>: <message>"

  Define an AlertService struct that holds a Notifier. Add a method:
    Alert(to string, subject string) string
  that calls n.Send(to, "ALERT: "+subject) and returns the result.

  Write a constructor NewAlertService(n Notifier) AlertService.

  The key insight: AlertService does not know or care which Notifier
  implementation it uses. You can swap EmailNotifier for SMSNotifier
  (or a mock in tests) without changing AlertService.

  Examples:
    svc := NewAlertService(EmailNotifier{})
    svc.Alert("alice@co.com", "server down")
    => "email to alice@co.com: ALERT: server down"

    svc2 := NewAlertService(SMSNotifier{})
    svc2.Alert("+1234", "disk full")
    => "sms to +1234: ALERT: disk full"
