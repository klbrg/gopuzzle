id: "lg03-003"
title: "Maps as Sets"
concept: "collections"
difficulty: 2
description: |
  Write a function unique that takes a []string and returns a []string
  containing only the unique values, in the order they first appear.

  For example:
    unique([]string{"go", "java", "go", "rust", "java"})
    returns ["go", "java", "rust"]

  Use a map[string]bool as a set to track which values you have seen.
