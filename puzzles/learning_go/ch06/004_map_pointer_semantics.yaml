id: "lg06-004"
title: "Map Pointer Semantics"
concept: "pointers"
difficulty: 4
description: |
  Maps in Go are reference types -- passing a map to a function lets that
  function modify the original map without needing a pointer. However, you
  cannot assign a new map to the caller's variable through a plain parameter.

  Write a function PopulateDefaults(m map[string]int) that adds default
  entries to the map. If a key does not already exist, set it:
    "timeout"  => 30
    "retries"  => 3
    "port"     => 8080
  Do not overwrite existing keys.

  Write a function MergeInto(dst, src map[string]int) that copies all
  key-value pairs from src into dst. If a key exists in both, the src
  value wins.

  Write a function Keys(m map[string]int) []string that returns a sorted
  slice of all keys in the map.

  Examples:
    m := map[string]int{"timeout": 60}
    PopulateDefaults(m)
    m => {"timeout": 60, "retries": 3, "port": 8080}

    dst := map[string]int{"a": 1}
    MergeInto(dst, map[string]int{"a": 99, "b": 2})
    dst => {"a": 99, "b": 2}

    Keys(map[string]int{"c": 3, "a": 1, "b": 2}) => ["a", "b", "c"]
