id: "lg06-003"
title: "Slice Mutation Through Functions"
concept: "pointers"
difficulty: 5
description: |
  Go slices contain a pointer to an underlying array, so a function that
  receives a slice can modify its existing elements -- but appending to
  it does NOT grow the caller's slice (the header is passed by value).

  Write a function UpperAll(s []string) that uppercases every element of
  the slice in place. The caller should see the changes without needing a
  return value.

  Write a function AppendItem(sp *[]string, item string) that appends an
  item to the caller's slice. Because append may reallocate the backing
  array, you need a pointer to the slice header.

  Write a function RemoveLast(sp *[]string) (string, bool) that removes
  and returns the last element. Return ("", false) if the slice is empty.

  Examples:
    s := []string{"go", "is", "fun"}
    UpperAll(s)
    s => ["GO", "IS", "FUN"]

    items := []string{"a"}
    AppendItem(&items, "b")
    items => ["a", "b"]

    last, ok := RemoveLast(&items)
    last => "b", ok => true
    items => ["a"]
template: |
