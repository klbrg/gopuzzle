test_code: |
  package main

  import (
  	"strings"
  	"testing"
  )

  func TestConcurrentMap(t *testing.T) {
  	got := concurrentMap([]string{"hello", "world", "go"}, strings.ToUpper)
  	if got[0] != "HELLO" || got[1] != "WORLD" || got[2] != "GO" {
  		t.Errorf("unexpected results: %v", got)
  	}
  }
hint: "Pre-allocate the result slice so each goroutine can write to its own index without a mutex."
solution: |
  package main

  import "sync"

  func concurrentMap(items []string, f func(string) string) []string {
  	results := make([]string, len(items))
  	var wg sync.WaitGroup
  	for i, item := range items {
  		wg.Add(1)
  		go func(i int, s string) {
  			defer wg.Done()
  			results[i] = f(s)
  		}(i, item)
  	}
  	wg.Wait()
  	return results
  }
explanation: |
  Pre-allocate the results slice so each goroutine writes to its own index (no mutex needed):
    results := make([]string, len(items))
    var wg sync.WaitGroup
    for i, item := range items {
        wg.Add(1)
        go func(i int, s string) {
            defer wg.Done()
            results[i] = f(s)
        }(i, item)
    }
    wg.Wait()
    return results
  Writing to different slice indices from different goroutines is safe — no overlap.
  wg.Add must be called before the goroutine starts, not inside it.
reference: "https://gobyexample.com/waitgroups"
