test_code: |
  package main

  import (
  	"sync"
  	"testing"
  )

  func TestSafeMap(t *testing.T) {
  	m := NewSafeMap()
  	var wg sync.WaitGroup
  	for i := 0; i < 100; i++ {
  		wg.Add(1)
  		go func(n int) {
  			defer wg.Done()
  			key := "key"
  			m.Set(key, n)
  			m.Get(key)
  		}(i)
  	}
  	wg.Wait()
  	m.Set("x", 42)
  	if v, ok := m.Get("x"); !ok || v != 42 {
  		t.Errorf("expected (42, true), got (%d, %v)", v, ok)
  	}
  	m.Delete("x")
  	if _, ok := m.Get("x"); ok {
  		t.Error("expected key to be deleted")
  	}
  }
hint: "sync.RWMutex allows concurrent readers: RLock/RUnlock for reads, Lock/Unlock for writes."
solution: |
  package main

  import "sync"

  type SafeMap struct {
  	mu   sync.RWMutex
  	data map[string]int
  }

  func NewSafeMap() *SafeMap {
  	return &SafeMap{data: make(map[string]int)}
  }

  func (m *SafeMap) Set(key string, val int) {
  	m.mu.Lock()
  	defer m.mu.Unlock()
  	m.data[key] = val
  }

  func (m *SafeMap) Get(key string) (int, bool) {
  	m.mu.RLock()
  	defer m.mu.RUnlock()
  	v, ok := m.data[key]
  	return v, ok
  }

  func (m *SafeMap) Delete(key string) {
  	m.mu.Lock()
  	defer m.mu.Unlock()
  	delete(m.data, key)
  }
explanation: |
  sync.RWMutex allows multiple concurrent readers or one writer:
    type SafeMap struct {
        mu sync.RWMutex
        data map[string]int
    }
    func (m *SafeMap) Set(k string, v int) {
        m.mu.Lock(); defer m.mu.Unlock()
        m.data[k] = v
    }
    func (m *SafeMap) Get(k string) (int, bool) {
        m.mu.RLock(); defer m.mu.RUnlock()
        v, ok := m.data[k]; return v, ok
    }
  defer m.mu.Unlock() ensures the lock is always released, even on panic.
reference: "https://gobyexample.com/mutexes"
