id: "12-003"
title: "Worker Pools"
concept: "concurrency"
difficulty: 7
description: |
  Implement processWithLimit(items []int, maxWorkers int, f func(int) int) []int that
  applies f to every item concurrently, using at most maxWorkers goroutines at a time.
  Return results in the same order as the input items. Use a semaphore channel to limit
  concurrency.
