id: "08-001"
title: "Pointers"
concept: "pointers"
difficulty: 3
description: |
  Write SwapInts(a, b *int) that swaps the values at two int pointers.
  Write Triple(n *int) that triples the value pointed to by n in place.
template: |
  package main

  // TODO: write SwapInts

