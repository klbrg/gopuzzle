id: "09-001"
title: "Strings and Runes"
concept: "strings"
difficulty: 3
description: |
  Write countRunes(s string) int that returns the number of Unicode characters in s.
  Write firstRune(s string) rune that returns the first character of s.
  Note: len(s) counts bytes, not characters.
