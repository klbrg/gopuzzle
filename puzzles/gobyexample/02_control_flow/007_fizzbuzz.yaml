id: "02-007"
title: "FizzBuzz"
concept: "control-flow"
difficulty: 2
description: |
  Classic FizzBuzz for a single number: return "FizzBuzz" if divisible by both
  3 and 5, "Fizz" if by 3, "Buzz" if by 5, or the number as a string.
template: |
  package main

  import "strconv"

  func fizzBuzz(n int) string {
  	// TODO
  }
test_code: |
  package main

  import "testing"

  func TestFizzBuzz(t *testing.T) {
  	tests := []struct {
  		in   int
  		want string
  	}{
  		{1, "1"},
  		{3, "Fizz"},
  		{5, "Buzz"},
  		{15, "FizzBuzz"},
  		{9, "Fizz"},
  		{10, "Buzz"},
  		{30, "FizzBuzz"},
  		{7, "7"},
  	}
  	for _, tt := range tests {
  		if got := fizzBuzz(tt.in); got != tt.want {
  			t.Errorf("fizzBuzz(%d): expected %q, got %q", tt.in, tt.want, got)
  		}
  	}
  }
hint: "Use the modulo operator %. Check divisible-by-15 first."
solution: |
  package main

  import "strconv"

  func fizzBuzz(n int) string {
  	switch {
  	case n%15 == 0:
  		return "FizzBuzz"
  	case n%3 == 0:
  		return "Fizz"
  	case n%5 == 0:
  		return "Buzz"
  	default:
  		return strconv.Itoa(n)
  	}
  }
explanation: |
  A tagless switch is clean for multiple conditions:
    switch {
    case n%15 == 0:  // must check 15 before 3 or 5
    case n%3 == 0:
    case n%5 == 0:
    default:
    }
  strconv.Itoa converts an int to its string representation.
  You could also use if/else — both are valid approaches.
reference: "https://gobyexample.com/switch"
