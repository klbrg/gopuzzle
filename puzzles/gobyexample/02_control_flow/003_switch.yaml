id: "02-003"
title: "Switch"
concept: "control-flow"
difficulty: 2
description: |
  Return the name of a weekday given its number (1=Monday through 7=Sunday).
  Return "Unknown" for any other value.
template: |
  package main

  func dayName(n int) string {
  	// TODO
  }
test_code: |
  package main

  import "testing"

  func TestDayName(t *testing.T) {
  	cases := map[int]string{
  		1: "Monday", 2: "Tuesday", 3: "Wednesday",
  		4: "Thursday", 5: "Friday", 6: "Saturday", 7: "Sunday",
  		0: "Unknown", 8: "Unknown",
  	}
  	for n, want := range cases {
  		if got := dayName(n); got != want {
  			t.Errorf("dayName(%d): expected %q, got %q", n, want, got)
  		}
  	}
  }
hint: "Go switch cases don't fall through by default; use default: for the catch-all."
solution: |
  package main

  func dayName(n int) string {
  	switch n {
  	case 1:
  		return "Monday"
  	case 2:
  		return "Tuesday"
  	case 3:
  		return "Wednesday"
  	case 4:
  		return "Thursday"
  	case 5:
  		return "Friday"
  	case 6:
  		return "Saturday"
  	case 7:
  		return "Sunday"
  	default:
  		return "Unknown"
  	}
  }
explanation: |
  Go's switch doesn't fall through by default — no break needed.
    switch n {
    case 1:
        return "Monday"
    case 2:
        return "Tuesday"
    // ...
    default:
        return "Unknown"
    }
  Multiple values in one case: case 6, 7: return "Weekend"
  You can also use switch without an expression (like if/else chains).
reference: "https://gobyexample.com/switch"
