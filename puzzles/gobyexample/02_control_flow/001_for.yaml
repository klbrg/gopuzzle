id: "02-001"
title: "For loop"
concept: "control-flow"
difficulty: 1
description: |
  Compute the sum of all integers from 1 to n (inclusive).
template: |
  package main

  func sumTo(n int) int {
  	// TODO
  }
test_code: |
  package main

  import "testing"

  func TestSumTo(t *testing.T) {
  	if got := sumTo(5); got != 15 {
  		t.Errorf("sumTo(5): expected 15, got %d", got)
  	}
  	if got := sumTo(10); got != 55 {
  		t.Errorf("sumTo(10): expected 55, got %d", got)
  	}
  	if got := sumTo(1); got != 1 {
  		t.Errorf("sumTo(1): expected 1, got %d", got)
  	}
  }
hint: "Go's for loop: for i := 1; i <= n; i++ { ... }"
solution: |
  package main

  func sumTo(n int) int {
  	sum := 0
  	for i := 1; i <= n; i++ {
  		sum += i
  	}
  	return sum
  }
explanation: |
  Go's for loop is the only loop construct — it covers all looping patterns.
  Classic C-style for loop:
    sum := 0
    for i := 1; i <= n; i++ {
        sum += i
    }
    return sum
  Go also supports while-style: for condition { } and infinite: for { }
reference: "https://gobyexample.com/for"
