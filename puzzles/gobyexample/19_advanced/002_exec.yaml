id: "19-002"
title: "Spawning Processes"
concept: "advanced"
difficulty: 6
description: |
  Write runWithInput(name string, input string, args ...string) (string, error) that
  runs an external command, pipes the given input string to its stdin, and returns
  the contents of stdout as a string.

  If the command exits with a non-zero status, return the error from Run.
