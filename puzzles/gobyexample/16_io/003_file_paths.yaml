id: "16-003"
title: "File Paths"
concept: "io"
difficulty: 3
description: |
  Write groupByExtension(paths []string) map[string][]string that takes a list of
  file paths and groups base filenames by their extension.

  The map keys are extensions (including the dot, e.g. ".txt") and the values are
  slices of base filenames that have that extension. Files with no extension are
  grouped under the empty string key "".
