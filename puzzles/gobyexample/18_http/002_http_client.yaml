description: |
  Write postJSON(url string, data any) (int, string, error) that sends an HTTP POST
  request with JSON-encoded data to the given URL.

  The function should:
    - JSON-encode data into the request body.
    - Set the Content-Type header to "application/json".
    - Return the response status code, body as a string, and any error.
