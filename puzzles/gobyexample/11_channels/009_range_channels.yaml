id: "11-009"
title: "Range over Channels"
concept: "channels"
difficulty: 6
description: |
  Implement merge(ch1, ch2 <-chan int) <-chan int that combines two input channels into
  a single output channel (fan-in). The output channel must close automatically when
  both inputs are closed. Values should appear as soon as they are available from
  either input.
