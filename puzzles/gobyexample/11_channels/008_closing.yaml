id: "11-008"
title: "Closing Channels"
concept: "channels"
difficulty: 5
description: |
  Write generate(vals []int) <-chan int that sends all values on a channel and closes it.
  Write drain(ch <-chan int) []int that collects all values until the channel is closed.
template: |
