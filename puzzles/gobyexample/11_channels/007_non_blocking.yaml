id: "11-007"
title: "Non-Blocking Channel Operations"
concept: "channels"
difficulty: 6
description: |
  Implement pollChannels(channels []<-chan string, timeout time.Duration) (int, string, bool)
  that checks a list of channels in priority order (index 0 is highest priority). Return
  the index and value of the first channel that has data ready, plus true. If no channel
  is ready, wait up to timeout for any of them, returning the index and value if one becomes
  ready. Return (-1, "", false) if the timeout expires with nothing available.
