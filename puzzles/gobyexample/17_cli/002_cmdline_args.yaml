id: "17-002"
title: "Command-Line Arguments"
concept: "cli"
difficulty: 2
description: |
  Write parseArgs(args []string) (flags map[string]string, positional []string) that
  splits a slice of command-line arguments into flags and positional arguments.

  Rules:
    - An item starting with "-" is a flag name; the next item is its value.
    - A flag at the end of the slice with no following value gets an empty string as its value.
    - All other items are positional arguments.
    - Strip the leading "-" or "--" prefix from flag names in the map.
template: |
