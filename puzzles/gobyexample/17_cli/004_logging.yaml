id: "17-004"
title: "Logging"
concept: "cli"
difficulty: 4
description: |
  Use log/slog (Go 1.21+) to write logEvents that creates a text logger writing to a buffer,
  logs an Info event with key "user"="alice", logs a Warn event with key "code"=404,
  and returns the log output as a string.
template: |
  package main

  import (
  	"bytes"
  	"log/slog"
  )

  func logEvents() string {
  	// TODO
  }
test_code: |
  package main

  import (
  	"strings"
  	"testing"
  )

  func TestLogEvents(t *testing.T) {
  	output := logEvents()
  	if !strings.Contains(output, "INFO") {
  		t.Error("expected INFO level in output")
  	}
  	if !strings.Contains(output, "alice") {
  		t.Error("expected 'alice' in output")
  	}
  	if !strings.Contains(output, "WARN") {
  		t.Error("expected WARN level in output")
  	}
  	if !strings.Contains(output, "404") {
  		t.Error("expected '404' in output")
  	}
  }
hint: "slog.New(slog.NewTextHandler(w, nil)) creates a structured logger writing to w."
solution: |
  package main

  import (
  	"bytes"
  	"log/slog"
  )

  func logEvents() string {
  	var buf bytes.Buffer
  	logger := slog.New(slog.NewTextHandler(&buf, nil))
  	logger.Info("user login", "user", "alice")
  	logger.Warn("not found", "code", 404)
  	return buf.String()
  }
explanation: |
  log/slog (Go 1.21+) is the standard structured logging package.
    h := slog.NewTextHandler(w, &slog.HandlerOptions{Level: slog.LevelDebug})
    logger := slog.New(h)
    logger.Info("message", "key", value)   // key-value pairs
    logger.Warn("warning", "code", 404)
    logger.Error("failed", "err", err)
  Output formats:
    slog.NewTextHandler  → key=value text
    slog.NewJSONHandler  → {"level":"INFO","msg":"..."} JSON
  Use slog.SetDefault(logger) to replace the global logger.
  Structured logging makes logs searchable and machine-readable.
reference: "https://gobyexample.com/logging"
