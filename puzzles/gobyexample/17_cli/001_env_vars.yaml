id: "17-001"
title: "Environment Variables"
concept: "cli"
difficulty: 3
description: |
  Write getEnv(key, fallback string) string that returns the environment variable
  or fallback if it is not set.
  Write requireEnv(key string) (string, error) that returns an error when the variable is absent.
