id: "15-002"
title: "Epoch"
concept: "time"
difficulty: 3
description: |
  Write ageInDays(birthUnix int64) int that takes a birth date as a Unix timestamp
  (seconds since epoch) and returns how many complete days old the person is right now.

  Write daysBetween(unix1, unix2 int64) int that returns the absolute number of
  complete days between two Unix timestamps (order should not matter).
