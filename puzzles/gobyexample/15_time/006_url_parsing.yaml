id: "15-006"
title: "URL Parsing"
concept: "time"
difficulty: 4
description: |
  Write buildURL(scheme, host, path string, params map[string]string) string that
  constructs a complete URL from its parts.

  The function should set the scheme, host, and path on a url.URL, encode the params
  map as query parameters using url.Values, and return the final URL string.
  If params is nil or empty, the URL should have no query string.
