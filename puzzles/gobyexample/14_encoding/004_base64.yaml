id: "14-004"
title: "Base64 Encoding"
concept: "encoding"
difficulty: 4
description: |
  Implement two functions:
  - isBase64(s string) bool that returns true if s is a valid standard base64 string
    (decodable without error and non-empty).
  - roundTrip(s string) (string, error) that encodes s to base64 and decodes it back,
    returning the result. Return an error if the decode step fails (it shouldn't, but
    handle it properly).
