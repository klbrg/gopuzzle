id: "14-002"
title: "XML"
concept: "encoding"
difficulty: 5
description: |
  Define a Config struct with XML tags for root element "config" and fields Host (string),
  Port (int), and Debug (bool). Implement xmlToMap(xmlData string) map[string]string that
  parses the XML into a Config struct, then extracts all fields into a flat map with
  lowercase keys and string values (e.g., {"host": "localhost", "port": "8080", "debug": "true"}).
