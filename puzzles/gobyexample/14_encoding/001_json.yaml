id: "14-001"
title: "JSON"
concept: "encoding"
difficulty: 5
description: |
  Implement mergeJSON(base, override string) (string, error) that takes two JSON object
  strings, merges them into one object where override's keys win on conflict, and returns
  the merged JSON string. Both inputs are flat JSON objects (no nesting required).
  Return an error if either input is invalid JSON.
